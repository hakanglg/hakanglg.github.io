name: porfolio_web
description: A new Flutter project.


publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ">=2.17.1 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # PUSH TO GITHUB
  github_pages: ^1.0.0

   # STATE MANAGEMENT
  flutter_mobx: ^2.0.5
  mobx: ^2.0.7
  provider: ^6.0.2

  # Responsive
  kartal: ^2.3.2
  auto_size_text: ^3.0.0

  # UI
  line_awesome_flutter: ^2.0.0
  carousel_slider: ^4.1.1
  percent_indicator: ^4.2.2

  # URL LAUNCHER
  url_launcher: ^6.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^2.0.0

  build_runner: ^2.1.10
  mobx_codegen: ^2.0.6

flutter:
 
 
  uses-material-design: true


  assets:
    - assets/images/wallpaper.PNG
    - assets/images/otodo_light.PNG
    - assets/images/otodo_dark.PNG
    - assets/images/otodo_mockup.PNG
    - assets/images/dabasir_mockup.PNG
    - assets/images/dabasir_dark.PNG
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins/Poppins-ExtraBold.ttf
        - asset: assets/fonts/Poppins/Poppins-ExtraLight.ttf
        - asset: assets/fonts/Poppins/Poppins-Light.ttf
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins/Poppins-Thin.ttf